<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gap Analysis — Bhutan Addressing Guideline vs ISO 19160-2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #f8f9fa;
      color: #202124;
      font-size: 11pt;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Google Docs–style toolbar */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #dadce0;
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 2px rgba(60,64,67,.15);
    }
    .toolbar .doc-icon {
      width: 28px; height: 28px;
      background: #4285f4;
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 700;
    }
    .toolbar .title {
      font-size: 14px;
      font-weight: 400;
      color: #202124;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .toolbar .meta {
      font-size: 12px;
      color: #5f6368;
    }

    /* Layout */
    .layout {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 16px 48px;
      gap: 24px;
    }

    /* Outline panel (Google Docs left nav style) */
    .outline {
      width: 220px;
      flex-shrink: 0;
      position: sticky;
      top: 72px;
      align-self: flex-start;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 12px 0;
    }
    .outline h4 {
      font-size: 11px;
      font-weight: 500;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 16px 8px;
    }
    .outline a {
      display: block;
      padding: 4px 16px;
      font-size: 12px;
      color: #3c4043;
      text-decoration: none;
      border-left: 3px solid transparent;
    }
    .outline a:hover { background: #f1f3f4; color: #1a73e8; }
    .outline a.active { border-left-color: #1a73e8; color: #1a73e8; background: #e8f0fe; }
    .outline a.l2 { padding-left: 28px; }
    .outline a.l3 { padding-left: 40px; font-size: 11px; }

    /* Document page */
    .page-wrap { flex: 1; min-width: 0; }

    .document {
      background: #fff;
      max-width: 816px;
      margin: 0 auto;
      padding: 72px 96px 96px;
      box-shadow: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
      border: 1px solid #dadce0;
      min-height: 1056px;
    }

    /* Markdown typography — Google Docs feel */
    .document h1 {
      font-size: 26pt;
      font-weight: 400;
      line-height: 1.2;
      margin: 0 0 12pt;
      color: #202124;
      border: none;
    }
    .document h2 {
      font-size: 16pt;
      font-weight: 400;
      line-height: 1.4;
      margin: 18pt 0 6pt;
      color: #202124;
      border: none;
      padding: 0;
    }
    .document h3 {
      font-size: 14pt;
      font-weight: 500;
      margin: 14pt 0 4pt;
      color: #202124;
    }
    .document h4 {
      font-size: 12pt;
      font-weight: 500;
      margin: 12pt 0 4pt;
      color: #3c4043;
    }
    .document p {
      margin: 0 0 8pt;
      color: #202124;
    }
    .document strong { font-weight: 700; }
    .document em { font-style: italic; }
    .document a {
      color: #1a73e8;
      text-decoration: underline;
    }
    .document hr {
      border: none;
      border-top: 1px solid #dadce0;
      margin: 16pt 0;
    }
    .document ul, .document ol {
      margin: 0 0 8pt 24pt;
    }
    .document li { margin-bottom: 4pt; }

    .document code {
      font-family: 'Roboto Mono', 'Consolas', monospace;
      font-size: 10pt;
      background: #f1f3f4;
      padding: 1px 4px;
      border-radius: 2px;
      color: #202124;
    }
    .document pre {
      background: #f8f9fa;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 12pt;
      overflow-x: auto;
      margin: 8pt 0 12pt;
      font-size: 10pt;
    }
    .document pre code {
      background: none;
      padding: 0;
    }

    /* Tables — Google Docs table style */
    .document table {
      width: 100%;
      border-collapse: collapse;
      margin: 8pt 0 12pt;
      font-size: 10pt;
    }
    .document th {
      background: #f8f9fa;
      font-weight: 500;
      text-align: left;
      padding: 6pt 8pt;
      border: 1px solid #dadce0;
      color: #202124;
    }
    .document td {
      padding: 6pt 8pt;
      border: 1px solid #dadce0;
      vertical-align: top;
      color: #202124;
    }
    .document tr:nth-child(even) td { background: #fafafa; }

    /* Mermaid diagrams in light theme */
    .document .mermaid {
      margin: 12pt 0;
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 48pt;
      color: #5f6368;
      font-size: 12pt;
    }

    @media (max-width: 900px) {
      .outline { display: none; }
      .document { padding: 48px 32px 64px; }
    }
    @media print {
      .toolbar, .outline { display: none; }
      body { background: #fff; }
      .document { box-shadow: none; border: none; padding: 0; max-width: 100%; }
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <div class="doc-icon">G</div>
    <span class="title">Gap Analysis: Bhutan City Addressing Guideline vs ISO 19160-2:2023</span>
    <span class="meta">Draft · June 2025</span>
  </header>

  <div class="layout">
    <nav class="outline" id="outline">
      <h4>Document outline</h4>
      <div id="outline-links"></div>
    </nav>

    <div class="page-wrap">
      <article class="document" id="document">
        <div class="loading">Loading document…</div>
      </article>
    </div>
  </div>

  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'neutral',
      securityLevel: 'loose'
    });

    marked.setOptions({
      gfm: true,
      breaks: false
    });

    const renderer = new marked.Renderer();
    const origCode = renderer.code.bind(renderer);
    renderer.code = function({ text, lang }) {
      if (lang === 'mermaid') {
        return `<div class="mermaid">${text}</div>`;
      }
      return origCode({ text, lang });
    };
    marked.use({ renderer });

    function slugify(text) {
      return text.toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim();
    }

    function buildOutline(container) {
      const links = document.getElementById('outline-links');
      links.innerHTML = '';
      container.querySelectorAll('h2, h3').forEach(h => {
        if (!h.id) h.id = slugify(h.textContent);
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent.replace(/^\d+\.\s*/, '');
        if (h.tagName === 'H3') a.classList.add('l3');
        else if (h.textContent.match(/^\d+\.\d+/)) a.classList.add('l2');
        a.addEventListener('click', e => {
          e.preventDefault();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', '#' + h.id);
        });
        links.appendChild(a);
      });

      // Scroll spy
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            links.querySelectorAll('a').forEach(a => {
              a.classList.toggle('active', a.getAttribute('href') === '#' + id);
            });
          }
        });
      }, { rootMargin: '-80px 0px -70% 0px' });
      container.querySelectorAll('h2, h3').forEach(h => observer.observe(h));
    }

    async function loadDocument() {
      const doc = document.getElementById('document');
      try {
        const res = await fetch('gap-analysis.md');
        if (!res.ok) throw new Error('Failed to load');
        const md = await res.text();
        doc.innerHTML = marked.parse(md);

        // Heading IDs for h1 too
        doc.querySelectorAll('h1').forEach(h => {
          if (!h.id) h.id = slugify(h.textContent);
        });

        buildOutline(doc);

        await mermaid.run({ querySelector: '.document .mermaid' });
      } catch (err) {
        doc.innerHTML = '<p style="color:#d93025">Could not load gap-analysis.md</p>';
      }
    }

    loadDocument();
  </script>
</body>
</html>
