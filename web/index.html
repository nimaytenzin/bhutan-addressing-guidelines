<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gap Analysis — Bhutan Addressing Guideline vs ISO 19160-2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f2ee;
      --surface: #fdfcfa;
      --text: #1a1a1a;
      --muted: #5c5c5c;
      --accent: #2563eb;
      --border: #e0ddd6;
      --page-pad: clamp(1.25rem, 3vw, 3rem);
      --toc-width: 280px;
      --header-h: 52px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      font-size: 1.125rem;
      line-height: 1.75;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Minimal header */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 1rem;
    }

    .toc-toggle {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .toc-toggle:hover { background: var(--bg); color: var(--text); }
    .toc-toggle[aria-expanded="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .header-title {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* Collapsible TOC */
    .toc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(0,0,0,.25);
    }
    .toc-overlay.open { display: block; }

    .toc {
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: 0;
      width: var(--toc-width);
      z-index: 160;
      background: var(--surface);
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      overflow-y: auto;
      padding: 1.25rem 0 2rem;
    }
    .toc.open { transform: translateX(0); }

    .toc-label {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 1.25rem 0.75rem;
    }

    .toc a {
      display: block;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.8125rem;
      line-height: 1.4;
      padding: 0.35rem 1.25rem;
      color: var(--muted);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: color 0.12s, background 0.12s;
    }
    .toc a:hover { color: var(--text); background: var(--bg); }
    .toc a.active { color: var(--accent); border-left-color: var(--accent); background: #eff6ff; }
    .toc a.l3 { padding-left: 2rem; font-size: 0.75rem; }

    /* Full-width reading area */
    .reader {
      padding-top: var(--header-h);
      min-height: 100vh;
      width: 100%;
    }

    .content {
      width: 100%;
      max-width: none;
      padding: 3rem var(--page-pad) 5rem;
    }

    /* Typography */
    .content h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin: 0 0 1.5rem;
      letter-spacing: -0.01em;
    }
    .content h2 {
      font-size: 1.375rem;
      font-weight: 600;
      line-height: 1.35;
      margin: 2.5rem 0 0.75rem;
      padding-top: 0.5rem;
    }
    .content h3 {
      font-size: 1.125rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 1.75rem 0 0.5rem;
    }
    .content h4 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.25rem 0 0.375rem;
    }
    .content p { margin: 0 0 1.125rem; }
    .content strong { font-weight: 700; }
    .content a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    .content ul, .content ol {
      margin: 0 0 1.125rem 1.5rem;
    }
    .content li { margin-bottom: 0.375rem; }
    .content li > ul, .content li > ol { margin-top: 0.375rem; }

    .content code {
      font-family: 'Source Sans 3', ui-monospace, monospace;
      font-size: 0.875em;
      background: #edeae4;
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }
    .content pre {
      background: #edeae4;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 0 0 1.25rem;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    .content pre code { background: none; padding: 0; }

    .table-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
      overflow-x: auto;
      margin: 0 0 1.25rem;
      -webkit-overflow-scrolling: touch;
    }

    .content table {
      width: auto;
      max-width: 100%;
      border-collapse: collapse;
      margin: 0;
      font-size: 0.9375rem;
      line-height: 1.5;
    }
    .content th {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 600;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      background: #edeae4;
    }
    .content td {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      vertical-align: top;
    }
    .content tr:nth-child(even) td { background: rgba(237,234,228,.45); }

    .content .mermaid {
      margin: 1.5rem 0;
      text-align: center;
      overflow-x: auto;
    }

    .loading {
      text-align: center;
      padding: 4rem 0;
      font-family: 'Source Sans 3', sans-serif;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      body { font-size: 1.0625rem; }
      .content { padding: 2rem var(--page-pad) 4rem; }
      .header-title { display: none; }
    }

    @media print {
      .header, .toc, .toc-overlay { display: none !important; }
      body { background: #fff; font-size: 11pt; }
      .reader { padding-top: 0; }
      .content { max-width: 100%; padding: 0; }
    }
  </style>
</head>
<body>
  <header class="header">
    <button class="toc-toggle" id="toc-toggle" aria-expanded="false" aria-controls="toc">Contents</button>
    <span class="header-title">Gap Analysis: Bhutan City Addressing Guideline vs ISO 19160-2:2023</span>
  </header>

  <div class="toc-overlay" id="toc-overlay"></div>
  <nav class="toc" id="toc" aria-label="Table of contents">
    <div class="toc-label">Table of contents</div>
    <div id="toc-links"></div>
  </nav>

  <main class="reader">
    <article class="content" id="content">
      <div class="loading">Loading document…</div>
    </article>
  </main>

  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    marked.setOptions({ gfm: true, breaks: false });

    const renderer = new marked.Renderer();
    const origCode = renderer.code.bind(renderer);
    renderer.code = function({ text, lang }) {
      if (lang === 'mermaid') return `<div class="mermaid">${text}</div>`;
      return origCode({ text, lang });
    };
    marked.use({ renderer });

    const toc = document.getElementById('toc');
    const overlay = document.getElementById('toc-overlay');
    const toggle = document.getElementById('toc-toggle');

    function setTocOpen(open) {
      toc.classList.toggle('open', open);
      overlay.classList.toggle('open', open);
      toggle.setAttribute('aria-expanded', open);
    }

    toggle.addEventListener('click', () => setTocOpen(!toc.classList.contains('open')));
    overlay.addEventListener('click', () => setTocOpen(false));
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') setTocOpen(false);
    });

    function slugify(text) {
      return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
    }

    function buildToc(container) {
      const links = document.getElementById('toc-links');
      links.innerHTML = '';
      container.querySelectorAll('h2, h3').forEach(h => {
        if (!h.id) h.id = slugify(h.textContent);
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent.replace(/^\d+\.\s*/, '');
        if (h.tagName === 'H3') a.classList.add('l3');
        a.addEventListener('click', e => {
          e.preventDefault();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', '#' + h.id);
          setTocOpen(false);
        });
        links.appendChild(a);
      });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            links.querySelectorAll('a').forEach(a => {
              a.classList.toggle('active', a.getAttribute('href') === '#' + id);
            });
          }
        });
      }, { rootMargin: '-60px 0px -70% 0px' });
      container.querySelectorAll('h2, h3').forEach(h => observer.observe(h));
    }

    async function loadDocument() {
      const el = document.getElementById('content');
      try {
        const res = await fetch('gap-analysis.md');
        if (!res.ok) throw new Error('Failed to load');
        el.innerHTML = marked.parse(await res.text());
        el.querySelectorAll('table').forEach(table => {
          const wrap = document.createElement('div');
          wrap.className = 'table-wrap';
          table.parentNode.insertBefore(wrap, table);
          wrap.appendChild(table);
        });
        el.querySelectorAll('h1').forEach(h => { if (!h.id) h.id = slugify(h.textContent); });
        buildToc(el);
        await mermaid.run({ querySelector: '.content .mermaid' });
      } catch {
        el.innerHTML = '<p style="color:#b91c1c">Could not load gap-analysis.md</p>';
      }
    }

    loadDocument();
  </script>
</body>
</html>
